services:
  - type: web
    name: twin-lite-pro
    runtime: python
    pythonVersion: 3.11.11
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "python -m uvicorn app.main:app --host=0.0.0.0 --port=10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DEEPL_API_KEY
        sync: false
