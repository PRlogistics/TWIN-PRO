<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TWIN Lite Icon Generator</title>
<style>
body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; }
.icon512 {
    width: 512px;
    height: 512px;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    border-radius: 25%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 200px;
    color: white;
    font-weight: 800;
    box-shadow: 0 20px 60px rgba(99, 102, 241, 0.4);
}
.icon192 {
    width: 192px;
    height: 192px;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    border-radius: 25%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 75px;
    color: white;
    font-weight: 800;
    margin-left: 50px;
}
.container { display: flex; align-items: center; gap: 50px; }
h2 { color: white; text-align: center; font-family: sans-serif; margin-bottom: 30px; }
</style>
</head>
<body>
<div>
    <h2>📱 Screenshot these icons for Play Store</h2>
    <div class="container">
        <div class="icon512">T</div>
        <div class="icon192">T</div>
    </div>
    <p style="color: #94a3b8; text-align: center; font-family: sans-serif; margin-top: 30px;">
        Left: 512x512 for Play Store | Right: 192x192 for app icon
    </p>
</div>
</body>
</html>
